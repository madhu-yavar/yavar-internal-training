<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="100" cy="100" r="85" fill="url(#bgGradient)"/>

  <!-- Main circle -->
  <circle cx="100" cy="100" r="65" fill="url(#mainGradient)"/>

  <!-- Y letter in modern style -->
  <path d="M 70 65 L 100 95 L 130 65 M 100 95 L 100 135"
        stroke="white"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Decorative dots -->
  <circle cx="70" cy="55" r="4" fill="white" opacity="0.8"/>
  <circle cx="130" cy="55" r="4" fill="white" opacity="0.8"/>
  <circle cx="100" cy="145" r="4" fill="white" opacity="0.8"/>
</svg>